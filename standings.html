<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Standings · Columbia Kings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site">
    <div class="wrap">
      <h1><span class="ball">⚾</span> <span id="teamName">Columbia Kings</span></h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="schedule.html">Schedule</a></li>
          <li><a href="practices.html">Practices</a></li>
          <li><a href="games.html">Games</a></li>
          <li><a href="stats.html">Stats</a></li>
          <li><a href="standings.html">Standings</a></li>
          <li><a href="entry.html">Entry</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <h2>League Standings</h2>

    <div id="leagueStandings">
      <p class="meta" id="standingsStatus">Loading standings from District 19…</p>
    </div>

    <h2>Our record</h2>
    <div id="ourRecord" class="grid"></div>
    <p class="meta">Computed from games posted in <a href="games.html">Games</a>.</p>
  </main>

  <footer class="site">Built for Coach Andrew · Atom Spring 2026</footer>

  <script>
    function el(tag, attrs = {}, ...children) {
      const e = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') e.className = v;
        else if (k === 'html') e.innerHTML = v;
        else e.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return e;
    }
    document.addEventListener('DOMContentLoaded', () => {
      const here = location.pathname.split('/').pop() || 'index.html';
      document.querySelectorAll('nav a').forEach(a => {
        if (a.getAttribute('href') === here) a.classList.add('active');
      });
    });
  </script>
  <script src="data/team.js"></script>
  <script src="data/games.js"></script>
  <script>
    (() => {
      const team = window.TEAM;
      const games = (window.GAMES && window.GAMES.games) || [];
      document.getElementById('teamName').textContent = team.team.name;

      const rec = { W: 0, L: 0, T: 0, RF: 0, RA: 0 };
      games.forEach(g => {
        if (g.result === 'W') rec.W++;
        else if (g.result === 'L') rec.L++;
        else if (g.result === 'T') rec.T++;
        rec.RF += Number(g.teamRuns || 0);
        rec.RA += Number(g.oppRuns || 0);
      });

      const mount = document.getElementById('ourRecord');
      const cards = [
        ['Record', `${rec.W}-${rec.L}${rec.T ? '-' + rec.T : ''}`],
        ['Runs For', rec.RF],
        ['Runs Against', rec.RA],
        ['Run Diff', (rec.RF - rec.RA >= 0 ? '+' : '') + (rec.RF - rec.RA)]
      ];
      cards.forEach(([label, n]) => {
        const box = el('div', { class: 'stat' });
        box.appendChild(el('span', { class: 'n' }, String(n)));
        box.appendChild(el('span', { class: 'l' }, label));
        mount.appendChild(box);
      });
    })();
  </script>
  <script>
  (async () => {
    const TARGET = 'https://dist19.com/baseball/atoms/';
    const PROXY  = 'https://api.allorigins.win/get?url=' + encodeURIComponent(TARGET);
    const mount  = document.getElementById('leagueStandings');
    const status = document.getElementById('standingsStatus');

    const fallback = () => {
      mount.innerHTML = `
        <div class="card">
          <p>Couldn't load standings automatically.</p>
          <p><a href="${TARGET}" target="_blank" rel="noopener" style="font-size:1.1rem;font-weight:600;">Open District 19 standings →</a></p>
        </div>`;
    };

    try {
      const res  = await fetch(PROXY);
      const json = await res.json();
      const html = json.contents;
      if (!html) { fallback(); return; }

      const doc    = new DOMParser().parseFromString(html, 'text/html');
      // Find the biggest table — most likely the standings table
      const tables = [...doc.querySelectorAll('table')];
      if (!tables.length) { fallback(); return; }
      const table  = tables.reduce((a, b) => a.rows.length >= b.rows.length ? a : b);

      // Build clean styled table
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';

      const t = document.createElement('table');
      t.style.cssText = 'width:100%;border-collapse:collapse;font-size:.95rem;color:inherit;';

      let dataRowIdx = 0;
      [...table.rows].forEach((row, ri) => {
        const isHeader = ri === 0;
        const isUs = row.textContent.toLowerCase().includes('cornish');

        // Collect non-logo cells first
        const cells = [...row.cells].filter(cell =>
          cell.textContent.trim() || !cell.querySelector('img')
        ).map(cell => cell.textContent.trim());

        // Skip rows with no usable content
        if (cells.length === 0) return;

        const tr = document.createElement('tr');
        if (isUs) {
          tr.style.cssText = 'background:#f0a500;color:#0a1628;font-weight:700;';
        } else if (isHeader) {
          tr.style.cssText = 'background:rgba(255,255,255,0.08);font-weight:600;color:rgba(255,255,255,0.7);font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;';
        } else {
          tr.style.cssText = dataRowIdx % 2 === 0
            ? 'background:rgba(255,255,255,0.04);'
            : 'background:transparent;';
        }

        cells.forEach((text, ci) => {
          const td = document.createElement(isHeader ? 'th' : 'td');
          td.textContent = text;
          td.style.cssText = 'padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.07);white-space:nowrap;text-align:center;';
          if (!isHeader && ci === 1) td.style.textAlign = 'left'; // Team name left-aligned
          tr.appendChild(td);
        });

        t.appendChild(tr);
        if (!isHeader) dataRowIdx++;
      });

      wrapper.appendChild(t);

      const updated = document.createElement('p');
      updated.className = 'meta';
      updated.style.marginTop = '6px';
      updated.innerHTML = `Live from <a href="${TARGET}" target="_blank" rel="noopener">dist19.com</a> · loaded ${new Date().toLocaleTimeString()}`;

      mount.innerHTML = '';
      mount.appendChild(wrapper);
      mount.appendChild(updated);

    } catch (e) {
      fallback();
    }
  })();
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
