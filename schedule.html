<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Schedule · Columbia TBD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site">
    <div class="wrap">
      <h1><span class="ball">⚾</span> <span id="teamName">9U Team</span></h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="schedule.html">Schedule</a></li>
          <li><a href="practices.html">Practices</a></li>
          <li><a href="games.html">Games</a></li>
          <li><a href="stats.html">Stats</a></li>
          <li><a href="standings.html">Standings</a></li>
          <li><a href="entry.html">Entry</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <h2>Schedule</h2>
    <div class="pill-row">
      <button class="active" data-filter="all">All</button>
      <button data-filter="game">Games</button>
      <button data-filter="practice">Practices</button>
      <button data-filter="upcoming">Upcoming</button>
    </div>
    <div style="margin-bottom:1rem;text-align:right;">
      <button id="exportIcs" style="background:var(--bg-alt);color:var(--fg);border:1px solid var(--border);border-radius:var(--radius);padding:0.45rem 1rem;cursor:pointer;font-size:0.875rem;display:inline-flex;align-items:center;gap:0.4rem;">
        🗓 Export to Apple Calendar
      </button>
    </div>
    <div id="events"></div>
  </main>

  <footer class="site">Built for Coach Andrew · 9U Spring 2026</footer>

  <script>
    async function loadJSON(path) {
      const res = await fetch(path, { cache: 'no-store' });
      if (!res.ok) throw new Error('Failed to load ' + path + ': ' + res.status);
      return res.json();
    }
    function el(tag, attrs = {}, ...children) {
      const e = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') e.className = v;
        else if (k === 'html') e.innerHTML = v;
        else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
        else e.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return e;
    }
    function fmtDate(iso) {
      const raw = String(iso);
      const d = new Date(raw.includes('T') ? raw : raw + 'T00:00');
      if (isNaN(d)) return iso;
      let s = d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      if (raw.includes('T')) s += ' · ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
      return s;
    }
    function minutesToClock(startMin, durMin) {
      const end = startMin + durMin;
      const f = m => Math.floor(m / 60) + ':' + (m % 60).toString().padStart(2, '0');
      return f(startMin) + '–' + f(end);
    }
    document.addEventListener('DOMContentLoaded', () => {
      const here = location.pathname.split('/').pop() || 'index.html';
      document.querySelectorAll('nav a').forEach(a => {
        if (a.getAttribute('href') === here) a.classList.add('active');
      });
    });
  </script>
  <script src="data/team.js"></script>
  <script src="data/schedule.js"></script>
  <script>
    (() => {
      const team = window.TEAM;
      const sched = window.SCHEDULE;
      document.getElementById('teamName').textContent = team.team.name;

      const all = sched.events
        .map(e => ({ ...e, d: new Date(e.date) }))
        .sort((a,b) => a.d - b.d);

      const mount = document.getElementById('events');

      function render(filter) {
        mount.innerHTML = '';
        const now = new Date();
        const list = all.filter(e => {
          if (filter === 'all') return true;
          if (filter === 'upcoming') return e.d >= now;
          return e.type === filter;
        });
        if (!list.length) {
          mount.innerHTML = '<div class="card"><p class="meta">No events match.</p></div>';
          return;
        }
        list.forEach(e => {
          const card = el('div', { class: 'card' });
          card.appendChild(el('span', { class: 'tag' + (e.type === 'game' ? '' : ' alt') }, e.type.toUpperCase()));
          card.appendChild(el('h3', {}, fmtDate(e.date)));
          const parts = [];
          if (e.opponent) parts.push(`vs ${e.opponent}${e.home ? ' (home)' : ' (away)'}`);
          if (e.duration) parts.push(`${e.duration} min`);
          if (e.location) parts.push(e.location);
          card.appendChild(el('p', {}, parts.join(' · ')));
          if (e.notes) card.appendChild(el('p', { class: 'meta' }, e.notes));
          if (e.practiceId) {
            card.appendChild(el('p', {}, el('a', { href: 'practices.html#' + e.practiceId }, 'View practice plan →')));
          }
          if (e.type === 'game') {
            const gameId = 'g-' + (e.date || '').split('T')[0];
            card.appendChild(el('p', {}, el('a', { href: 'game.html#' + gameId }, 'View lineup & box score →')));
          }
          mount.appendChild(card);
        });
      }

      const defaultFilter = 'upcoming';
      document.querySelector(`[data-filter="${defaultFilter}"]`).classList.add('active');
      document.querySelector('[data-filter="all"]').classList.remove('active');
      render(defaultFilter);
      document.querySelectorAll('[data-filter]').forEach(b => {
        b.addEventListener('click', () => {
          document.querySelectorAll('[data-filter]').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          render(b.dataset.filter);
        });
      });

      // ── Apple Calendar / ICS export ──────────────────────────────────
      function toIcsDate(iso) {
        // iso is like "2026-05-12T18:00" — treat as local (America/Chicago)
        const d = new Date(iso);
        const pad = n => String(n).padStart(2, '0');
        // Floating local time (no Z) so Apple Calendar uses device timezone
        return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) +
               'T' + pad(d.getHours()) + pad(d.getMinutes()) + '00';
      }
      function icsEscape(s) {
        return String(s || '').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
      }
      function buildIcs(events) {
        const lines = [
          'BEGIN:VCALENDAR',
          'VERSION:2.0',
          'PRODID:-//Columbia 9U Baseball//Schedule//EN',
          'CALSCALE:GREGORIAN',
          'X-WR-CALNAME:Columbia 9U Baseball',
          'X-WR-TIMEZONE:America/Chicago',
        ];
        events.forEach((e, i) => {
          const start = toIcsDate(e.date);
          const durMs = (e.duration || (e.type === 'game' ? 90 : 90)) * 60 * 1000;
          const endD = new Date(new Date(e.date).getTime() + durMs);
          const pad = n => String(n).padStart(2,'0');
          const end = endD.getFullYear() + pad(endD.getMonth()+1) + pad(endD.getDate()) +
                      'T' + pad(endD.getHours()) + pad(endD.getMinutes()) + '00';
          let summary = e.type === 'game'
            ? `9U Baseball: vs ${e.opponent}${e.home ? ' (home)' : ' (away)'}`
            : '9U Baseball Practice';
          lines.push(
            'BEGIN:VEVENT',
            `UID:columbia9u-${e.date.replace(/\D/g,'')}-${i}@baseball`,
            `DTSTART;TZID=America/Chicago:${start}`,
            `DTEND;TZID=America/Chicago:${end}`,
            `SUMMARY:${icsEscape(summary)}`,
            `LOCATION:${icsEscape(e.location || '')}`,
            e.notes ? `DESCRIPTION:${icsEscape(e.notes)}` : 'DESCRIPTION:',
            'END:VEVENT'
          );
        });
        lines.push('END:VCALENDAR');
        return lines.join('\r\n');
      }
      document.getElementById('exportIcs').addEventListener('click', () => {
        const activeFilter = document.querySelector('[data-filter].active')?.dataset.filter || 'upcoming';
        const now = new Date();
        const toExport = all.filter(e => {
          if (activeFilter === 'all') return true;
          if (activeFilter === 'upcoming') return e.d >= now;
          return e.type === activeFilter;
        });
        if (!toExport.length) { alert('No events to export.'); return; }
        const ics = buildIcs(toExport);
        const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'columbia-9u-baseball.ics';
        a.click();
        URL.revokeObjectURL(url);
      });
    })();
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
