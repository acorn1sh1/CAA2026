<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Games · Columbia Kings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site">
    <div class="wrap">
      <h1><span class="ball">⚾</span> <span id="teamName">Columbia Kings</span></h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="schedule.html">Schedule</a></li>
          <li><a href="practices.html">Practices</a></li>
          <li><a href="games.html">Games</a></li>
          <li><a href="stats.html">Stats</a></li>
          <li><a href="standings.html">Standings</a></li>
          <li><a href="entry.html">Entry</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <h2>Games</h2>

    <div id="record" class="grid"></div>

    <div class="card" style="padding:0; overflow-x:auto;">
      <table id="gameGrid">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Opponent</th>
            <th>Location</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <footer class="site">Built for Coach Andrew · Atom Spring 2026</footer>

  <script>
    function el(tag, attrs = {}, ...children) {
      const e = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') e.className = v;
        else if (k === 'html') e.innerHTML = v;
        else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
        else e.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return e;
    }
    document.addEventListener('DOMContentLoaded', () => {
      const here = location.pathname.split('/').pop() || 'index.html';
      document.querySelectorAll('nav a').forEach(a => {
        if (a.getAttribute('href') === here) a.classList.add('active');
      });
    });
  </script>
  <script src="data/team.js"></script>
  <script src="data/games.js"></script>
  <script>
    (() => {
      const team = window.TEAM;
      const games = (window.GAMES && window.GAMES.games) || [];
      document.getElementById('teamName').textContent = team.team.name;

      // Record summary
      const rec = { W: 0, L: 0, T: 0, RF: 0, RA: 0 };
      games.forEach(g => {
        if (g.result === 'W') rec.W++;
        else if (g.result === 'L') rec.L++;
        else if (g.result === 'T') rec.T++;
        rec.RF += Number(g.teamRuns || 0);
        rec.RA += Number(g.oppRuns || 0);
      });
      const recEl = document.getElementById('record');
      [
        ['Record', `${rec.W}-${rec.L}${rec.T ? '-' + rec.T : ''}`],
        ['Runs For', rec.RF],
        ['Runs Against', rec.RA],
        ['Run Diff', (rec.RF - rec.RA >= 0 ? '+' : '') + (rec.RF - rec.RA)]
      ].forEach(([label, n]) => {
        const box = el('div', { class: 'stat' });
        box.appendChild(el('span', { class: 'n' }, String(n)));
        box.appendChild(el('span', { class: 'l' }, label));
        recEl.appendChild(box);
      });

      // Grid
      const tbody = document.querySelector('#gameGrid tbody');
      const sorted = games.slice().sort((a, b) => new Date(a.date) - new Date(b.date));

      if (!sorted.length) {
        const tr = el('tr');
        tr.innerHTML = '<td colspan="5" style="text-align:center;padding:1rem;" class="meta">No games yet. Add one via <a href="entry.html">stat entry</a>.</td>';
        tbody.appendChild(tr);
      }

      sorted.forEach(g => {
        const d = new Date(g.date);
        const dateStr = isNaN(d) ? g.date : d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        const timeStr = String(g.date).includes('T') ? d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) : '';
        const opp = (g.home ? 'vs ' : '@ ') + (g.opponent || 'TBD');

        // Result link
        let linkText, linkClass;
        if (g.result === 'W') {
          linkText = `W ${g.teamRuns}-${g.oppRuns}`;
          linkClass = '';
        } else if (g.result === 'L') {
          linkText = `L ${g.teamRuns}-${g.oppRuns}`;
          linkClass = 'alt';
        } else if (g.result === 'T') {
          linkText = `T ${g.teamRuns}-${g.oppRuns}`;
          linkClass = 'alt';
        } else {
          linkText = 'Preview';
          linkClass = '';
        }

        const tr = el('tr');
        tr.appendChild(el('td', {}, dateStr));
        tr.appendChild(el('td', {}, timeStr));
        tr.appendChild(el('td', {}, opp));
        tr.appendChild(el('td', {}, g.location || ''));
        const linkTd = el('td');
        const link = el('a', { href: 'game.html#' + (g.id || '') }, linkText);
        link.style.fontWeight = '600';
        if (linkClass) link.className = linkClass;
        linkTd.appendChild(link);
        tr.appendChild(linkTd);
        tbody.appendChild(tr);
      });
    })();
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
