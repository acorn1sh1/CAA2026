<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Game Detail · Columbia TBD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site">
    <div class="wrap">
      <h1><span class="ball">⚾</span> <span id="teamName">9U Team</span></h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="schedule.html">Schedule</a></li>
          <li><a href="practices.html">Practices</a></li>
          <li><a href="games.html">Games</a></li>
          <li><a href="stats.html">Stats</a></li>
          <li><a href="standings.html">Standings</a></li>
          <li><a href="entry.html">Entry</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <p><a href="games.html">← Back to Games</a></p>
    <div id="gameDetail"></div>
  </main>

  <footer class="site">Built for Coach Andrew · 9U Spring 2026</footer>

  <script>
    function el(tag, attrs = {}, ...children) {
      const e = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') e.className = v;
        else if (k === 'html') e.innerHTML = v;
        else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
        else e.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return e;
    }
    function avg(h, ab) { return ab ? (h/ab).toFixed(3).replace(/^0/, '') : '.000'; }
    document.addEventListener('DOMContentLoaded', () => {
      const here = location.pathname.split('/').pop() || 'index.html';
      document.querySelectorAll('nav a').forEach(a => {
        if (a.getAttribute('href') === here || (here === 'game.html' && a.getAttribute('href') === 'games.html')) a.classList.add('active');
      });
    });
  </script>
  <script src="data/team.js"></script>
  <script src="data/games.js"></script>
  <script>
    (() => {
      const team = window.TEAM;
      const games = (window.GAMES && window.GAMES.games) || [];
      document.getElementById('teamName').textContent = team.team.name;

      const mount = document.getElementById('gameDetail');
      const gameId = (location.hash || '').replace(/^#/, '');

      if (!gameId) {
        mount.innerHTML = '<div class="card"><p class="meta">No game selected. <a href="games.html">View all games</a>.</p></div>';
        return;
      }

      const g = games.find(x => x.id === gameId);
      if (!g) {
        mount.innerHTML = '<div class="card"><p class="meta">Game not found. <a href="games.html">View all games</a>.</p></div>';
        return;
      }

      // Header
      const d = new Date(g.date);
      const dateStr = isNaN(d) ? g.date : d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      const timeStr = String(g.date).includes('T') ? d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) : '';

      const heading = el('h2');
      if (g.result) {
        heading.appendChild(el('span', { class: 'tag' + (g.result === 'W' ? '' : ' alt'), style: 'margin-right:0.5rem;' }, g.result));
      }
      heading.appendChild(document.createTextNode(`${g.home ? 'vs' : '@'} ${g.opponent || 'TBD'}`));
      mount.appendChild(heading);

      // Info line
      const infoParts = [dateStr];
      if (timeStr) infoParts.push(timeStr);
      if (g.location) infoParts.push(g.location);
      mount.appendChild(el('p', { class: 'meta' }, infoParts.join(' · ')));

      // Score
      if (g.result) {
        const scoreBox = el('div', { class: 'grid', style: 'margin:1rem 0;' });
        [
          [team.team.name, g.teamRuns ?? 0],
          [g.opponent || 'Opp', g.oppRuns ?? 0]
        ].forEach(([label, n]) => {
          const box = el('div', { class: 'stat' });
          box.appendChild(el('span', { class: 'n' }, String(n)));
          box.appendChild(el('span', { class: 'l' }, label));
          scoreBox.appendChild(box);
        });
        mount.appendChild(scoreBox);
      }

      if (g.notes) mount.appendChild(el('p', { class: 'meta' }, g.notes));

      const POSITIONS = ['P','C','1B','2B','SS','3B','LF','LCF','RCF','RF'];
      const posLabel = {'1B':'1st','2B':'2nd','3B':'3rd','P':'P','C':'C','SS':'SS','LF':'LF','LCF':'LCF','RCF':'RCF','RF':'RF'};

      // === LINEUP ===
      if (g.lineup && g.lineup.battingOrder && g.lineup.battingOrder.length && g.lineup.defense) {
        mount.appendChild(el('h3', { style: 'margin-top:1.5rem;' }, 'Lineup'));
        const dWrap = el('div', { class: 'card', style: 'padding:0;overflow-x:auto;' });
        const tbl = el('table');

        const thead = el('thead');
        const thr = el('tr');
        thr.appendChild(el('th', {}, '#'));
        thr.appendChild(el('th', {}, 'Player'));
        const innings = Object.keys(g.lineup.defense).sort((a,b) => Number(a) - Number(b));
        innings.forEach(inn => thr.appendChild(el('th', { class: 'num' }, inn)));
        thead.appendChild(thr);
        tbl.appendChild(thead);

        // Reverse lookup: player → { inning: position }
        const playerPos = {};
        innings.forEach(inn => {
          const posMap = g.lineup.defense[inn];
          Object.entries(posMap).forEach(([pos, name]) => {
            if (!playerPos[name]) playerPos[name] = {};
            playerPos[name][inn] = posLabel[pos] || pos;
          });
        });

        const tbody = el('tbody');
        g.lineup.battingOrder.forEach((name, idx) => {
          const tr = el('tr');
          const numTd = el('td', {}, String(idx + 1));
          numTd.style.cssText = 'font-weight:600;font-variant-numeric:tabular-nums;';
          tr.appendChild(numTd);
          tr.appendChild(el('td', { title: name }, name.split(' ')[0]));
          innings.forEach(inn => {
            const pos = (playerPos[name] && playerPos[name][inn]) || 'Sit';
            const td = el('td', { class: 'num' }, pos);
            td.style.fontSize = '0.85rem';
            if (pos === 'Sit') { td.style.color = 'var(--muted)'; td.style.fontStyle = 'italic'; }
            if (pos === 'P') td.style.fontWeight = '600';
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        dWrap.appendChild(tbl);
        mount.appendChild(dWrap);
      }

      // === LINE SCORE ===
      if (Array.isArray(g.byInning) && g.byInning.length) {
        mount.appendChild(el('h3', { style: 'margin-top:1.5rem;' }, 'Line Score'));
        const lsWrap = el('div', { class: 'card', style: 'padding:0;overflow-x:auto;' });
        const tbl = el('table');
        const thead = el('thead');
        const thr = el('tr');
        thr.appendChild(el('th', {}, ''));
        g.byInning.forEach((_, i) => thr.appendChild(el('th', { class: 'num' }, String(i + 1))));
        thr.appendChild(el('th', { class: 'num' }, 'R'));
        thead.appendChild(thr);
        tbl.appendChild(thead);
        const tbody = el('tbody');
        const usRow = el('tr'); usRow.appendChild(el('td', {}, team.team.name));
        const oppRow = el('tr'); oppRow.appendChild(el('td', {}, g.opponent || 'Opp'));
        let usTot = 0, oppTot = 0;
        g.byInning.forEach(([u, o]) => {
          usTot += Number(u || 0); oppTot += Number(o || 0);
          usRow.appendChild(el('td', { class: 'num' }, String(u ?? '')));
          oppRow.appendChild(el('td', { class: 'num' }, String(o ?? '')));
        });
        usRow.appendChild(el('td', { class: 'num' }, String(usTot)));
        oppRow.appendChild(el('td', { class: 'num' }, String(oppTot)));
        tbody.appendChild(usRow); tbody.appendChild(oppRow);
        tbl.appendChild(tbody);
        lsWrap.appendChild(tbl);
        mount.appendChild(lsWrap);
      }

      // === BOX SCORE ===
      if (Array.isArray(g.batting) && g.batting.length) {
        mount.appendChild(el('h3', { style: 'margin-top:1.5rem;' }, 'Box Score'));
        const bWrap = el('div', { class: 'card', style: 'padding:0;overflow-x:auto;' });
        const tbl = el('table');
        const thead = el('thead');
        const thr = el('tr');
        ['Name','AB','H','2B','3B','HR','BB','K','R','RBI','AVG'].forEach((h, i) => {
          thr.appendChild(el('th', { class: i === 0 ? '' : 'num' }, h));
        });
        thead.appendChild(thr);
        tbl.appendChild(thead);
        const tbody = el('tbody');
        g.batting.forEach(p => {
          const tr = el('tr');
          tr.appendChild(el('td', {}, p.name || ''));
          ['AB','H','2B','3B','HR','BB','K','R','RBI'].forEach(k => {
            tr.appendChild(el('td', { class: 'num' }, String(p[k] ?? 0)));
          });
          tr.appendChild(el('td', { class: 'num' }, avg(p.H || 0, p.AB || 0)));
          tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        bWrap.appendChild(tbl);
        mount.appendChild(bWrap);
      }

      // === PITCHING ===
      if (Array.isArray(g.pitching) && g.pitching.length) {
        mount.appendChild(el('h3', { style: 'margin-top:1.5rem;' }, 'Pitching'));
        const pWrap = el('div', { class: 'card', style: 'padding:0;overflow-x:auto;' });
        const tbl = el('table');
        const thead = el('thead');
        const thr = el('tr');
        ['Name','IP','H','R','BB','K','HBP'].forEach((h, i) => {
          thr.appendChild(el('th', { class: i === 0 ? '' : 'num' }, h));
        });
        thead.appendChild(thr);
        tbl.appendChild(thead);
        const tbody = el('tbody');
        g.pitching.forEach(p => {
          const tr = el('tr');
          tr.appendChild(el('td', {}, p.name || ''));
          tr.appendChild(el('td', { class: 'num' }, String(p.IP || 0)));
          ['H','R','BB','K','HBP'].forEach(k => {
            tr.appendChild(el('td', { class: 'num' }, String(p[k] ?? 0)));
          });
          tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        pWrap.appendChild(tbl);
        mount.appendChild(pWrap);
      }

      // No data placeholder
      if (!g.lineup && !g.batting && !g.pitching && !g.byInning) {
        mount.appendChild(el('div', { class: 'card' },
          el('p', { class: 'meta' }, 'No stats entered yet. Use the stat entry form to add data.')
        ));
      }

      // Entry link — always shown at bottom of game detail
      const date = (g.date || '').split('T')[0];
      const entryCard = el('div', { class: 'card', style: 'margin-top:1.5rem;text-align:right;' });
      entryCard.appendChild(el('a', { href: 'entry.html?date=' + date }, '✏️ Enter / edit stats for this game →'));
      mount.appendChild(entryCard);
    })();
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
