<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Game Detail · Columbia Kings</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Lineup sheet styles (scoped to .lu-*) ── */
    .lu-wrap { display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap; margin-top:0.75rem; font-family:Arial,sans-serif; font-size:12px; color:#000; }
    .lu-bat-card { flex:0 0 168px; }
    .lu-def-section { flex:1; min-width:0; overflow-x:auto; }
    .lu-card-title { background:#1a3a5c; color:#fff; text-align:center; font-weight:700; font-size:11px; padding:5px 0; text-transform:uppercase; letter-spacing:1px; border-radius:3px 3px 0 0; }
    /* batting table */
    .lu-bat-tbl { width:100%; border-collapse:collapse; border:1px solid #aaa; border-top:none; }
    .lu-bat-tbl tr:nth-child(even) td { background:#f0f4f8; }
    .lu-bat-tbl tr:nth-child(odd) td  { background:#fff; }
    .lu-bat-tbl td { padding:5px 7px; border-bottom:1px solid #ccc; color:#000; }
    .lu-bat-tbl .lu-num { color:#1a3a5c; font-weight:700; width:24px; text-align:center; border-right:1px solid #ccc; }
    /* defense table */
    .lu-def-tbl { width:100%; border-collapse:collapse; border:1px solid #aaa; border-top:none; table-layout:fixed; }
    .lu-def-tbl th { background:#1a3a5c; color:#fff; text-align:center; padding:5px 4px; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; border-right:1px solid #4a6a8c; }
    .lu-def-tbl th:last-child { border-right:none; }
    .lu-def-tbl .lu-pos-hdr { background:#2d5a8e !important; text-align:left !important; padding-left:7px !important; width:42px; border-radius:3px 0 0 0; }
    .lu-def-tbl td { padding:4px 3px; border-bottom:1px solid #ccc; border-right:1px solid #ccc; text-align:center; font-size:11px; word-break:break-word; color:#000; }
    .lu-def-tbl td:last-child { border-right:none; }
    .lu-def-tbl tr:nth-child(odd)  td { background:#fff; }
    .lu-def-tbl tr:nth-child(even) td { background:#f0f4f8; }
    .lu-def-tbl .lu-pos-lbl { background:#e8eef5 !important; font-weight:700; color:#1a3a5c !important; text-align:left; padding-left:7px; border-right:2px solid #1a3a5c; }
    .lu-row-P  td { background:#ddeeff !important; color:#000 !important; }
    .lu-row-P  .lu-pos-lbl { background:#b8d8f8 !important; }
    .lu-row-C  td { background:#e8f5e8 !important; color:#000 !important; }
    .lu-row-C  .lu-pos-lbl { background:#c8ecc8 !important; }
    .lu-row-bn td { background:#fff8e1 !important; color:#7a5000 !important; }
    .lu-row-bn .lu-pos-lbl { background:#ffe8a0 !important; color:#7a5000 !important; }
    /* legend */
    .lu-legend { display:flex; gap:14px; flex-wrap:wrap; margin-top:8px; font-size:10px; color:#555; font-family:Arial,sans-serif; }
    .lu-legend-dot { display:inline-block; width:12px; height:12px; border-radius:2px; margin-right:4px; vertical-align:middle; }
    /* pdf button */
    .lu-pdf-btn { display:inline-block; margin-top:12px; padding:6px 14px; background:#1a3a5c; color:#fff; border:none; border-radius:4px; font-size:12px; font-family:Arial,sans-serif; cursor:pointer; text-decoration:none; }
    .lu-pdf-btn:hover { background:#2d5a8e; }
    /* print: hide site chrome, show only lineup */
    @media print {
      header.site, footer.site, nav, .site, #gameDetail > p:first-child,
      h2, p.meta, .grid, .lu-pdf-btn, a[href*="entry.html"] { display:none !important; }
      body, main { background:#fff !important; color:#000 !important; padding:0 !important; margin:0 !important; }
      .lu-wrap, .lu-bat-card, .lu-def-section, .lu-legend { display:flex !important; }
      @page { margin:0.5in; }
    }
  </style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <h1><span class="ball">⚾</span> <span id="teamName">Columbia Kings</span></h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="schedule.html">Schedule</a></li>
          <li><a href="practices.html">Practices</a></li>
          <li><a href="games.html">Games</a></li>
          <li><a href="stats.html">Stats</a></li>
          <li><a href="standings.html">Standings</a></li>
          <li><a href="entry.html">Entry</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <p><a href="games.html">← Back to Games</a></p>
    <div id="gameDetail"></div>
  </main>

  <footer class="site">Built for Coach Andrew · Atom Spring 2026</footer>

  <script>
    function el(tag, attrs = {}, ...children) {
      const e = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') e.className = v;
        else if (k === 'html') e.innerHTML = v;
        else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
        else e.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return e;
    }
    function avg(h, ab) { return ab ? (h/ab).toFixed(3).replace(/^0/, '') : '.000'; }
    document.addEventListener('DOMContentLoaded', () => {
      const here = location.pathname.split('/').pop() || 'index.html';
      document.querySelectorAll('nav a').forEach(a => {
        if (a.getAttribute('href') === here || (here === 'game.html' && a.getAttribute('href') === 'games.html')) a.classList.add('active');
      });
    });
  </script>
  <script src="data/team.js"></script>
  <script src="data/games.js"></script>
  <script>
    (() => {
      const team = window.TEAM;
      const games = (window.GAMES && window.GAMES.games) || [];
      document.getElementById('teamName').textContent = team.team.name;

      const mount = document.getElementById('gameDetail');
      const gameId = (location.hash || '').replace(/^#/, '');

      if (!gameId) {
        mount.innerHTML = '<div class="card"><p class="meta">No game selected. <a href="games.html">View all games</a>.</p></div>';
        return;
      }

      const g = games.find(x => x.id === gameId);
      if (!g) {
        mount.innerHTML = '<div class="card"><p class="meta">Game not found. <a href="games.html">View all games</a>.</p></div>';
        return;
      }

      // Header
      const d = new Date(g.date);
      const dateStr = isNaN(d) ? g.date : d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      const timeStr = String(g.date).includes('T') ? d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) : '';

      const heading = el('h2');
      if (g.result) {
        heading.appendChild(el('span', { class: 'tag' + (g.result === 'W' ? '' : ' alt'), style: 'margin-right:0.5rem;' }, g.result));
      }
      heading.appendChild(document.createTextNode(`${g.home ? 'vs' : '@'} ${g.opponent || 'TBD'}`));
      mount.appendChild(heading);

      // Info line
      const infoParts = [dateStr];
      if (timeStr) infoParts.push(timeStr);
      if (g.location) infoParts.push(g.location);
      mount.appendChild(el('p', { class: 'meta' }, infoParts.join(' · ')));

      // Score
      if (g.result) {
        const scoreBox = el('div', { class: 'grid', style: 'margin:1rem 0;' });
        [
          [team.team.name, g.teamRuns ?? 0],
          [g.opponent || 'Opp', g.oppRuns ?? 0]
        ].forEach(([label, n]) => {
          const box = el('div', { class: 'stat' });
          box.appendChild(el('span', { class: 'n' }, String(n)));
          box.appendChild(el('span', { class: 'l' }, label));
          scoreBox.appendChild(box);
        });
        mount.appendChild(scoreBox);
      }

      if (g.notes) mount.appendChild(el('p', { class: 'meta' }, g.notes));

      const POSITIONS = ['P','C','1B','2B','SS','3B','LF','LCF','RCF','RF'];
      const posLabel = {'1B':'1st','2B':'2nd','3B':'3rd','P':'P','C':'C','SS':'SS','LF':'LF','LCF':'LCF','RCF':'RCF','RF':'RF'};

      // Lookup jersey number by player name (from roster)
      const jerseyByName = {};
      (team.roster || []).forEach(p => { jerseyByName[p.name] = p.num; });

      // === LINEUP ===
      if (g.lineup && g.lineup.battingOrder && g.lineup.battingOrder.length && g.lineup.defense) {
        mount.appendChild(el('h3', { style: 'margin-top:1.5rem;' }, 'Lineup'));

        const DEF_POSITIONS = ['P','C','1B','2B','SS','3B','LF','LCF','RCF','RF'];
        const innings = Object.keys(g.lineup.defense).sort((a,b) => Number(a) - Number(b));

        // "First Last" → "F. Last"
        const abbr = name => {
          const parts = name.trim().split(' ');
          return parts.length >= 2 ? parts[0][0] + '. ' + parts.slice(1).join(' ') : name;
        };

        // Which players are on field each inning
        const fieldedPerInning = {};
        innings.forEach(inn => {
          fieldedPerInning[inn] = new Set(Object.values(g.lineup.defense[inn] || {}));
        });

        const wrap = el('div', { class: 'lu-wrap' });

        // ── Batting order ──
        const batCard = el('div', { class: 'lu-bat-card' });
        batCard.appendChild(el('div', { class: 'lu-card-title' }, 'Batting Order'));
        const bTbl = el('table', { class: 'lu-bat-tbl' });
        const bTbody = el('tbody');
        g.lineup.battingOrder.forEach((name, idx) => {
          const tr = el('tr');
          tr.appendChild(el('td', { class: 'lu-num' }, String(idx + 1)));
          tr.appendChild(el('td', {}, name));
          bTbody.appendChild(tr);
        });
        bTbl.appendChild(bTbody);
        batCard.appendChild(bTbl);
        wrap.appendChild(batCard);

        // ── Defensive rotation ──
        const defSec = el('div', { class: 'lu-def-section' });
        defSec.appendChild(el('div', { class: 'lu-card-title' }, 'Defensive Rotation by Inning'));
        const dTbl = el('table', { class: 'lu-def-tbl' });

        const dHead = el('thead');
        const dHr = el('tr');
        dHr.appendChild(el('th', { class: 'lu-pos-hdr' }, 'POS'));
        innings.forEach(inn => dHr.appendChild(el('th', {}, 'INN ' + inn)));
        dHead.appendChild(dHr);
        dTbl.appendChild(dHead);

        const dBody = el('tbody');

        DEF_POSITIONS.forEach(pos => {
          const rowClass = pos === 'P' ? 'lu-row-P' : pos === 'C' ? 'lu-row-C' : '';
          const tr = el('tr', { class: rowClass });
          tr.appendChild(el('td', { class: 'lu-pos-lbl' }, pos));
          innings.forEach(inn => {
            const name = (g.lineup.defense[inn] || {})[pos] || '';
            tr.appendChild(el('td', {}, name ? abbr(name) : '—'));
          });
          dBody.appendChild(tr);
        });

        // Bench row
        const benchTr = el('tr', { class: 'lu-row-bn' });
        benchTr.appendChild(el('td', { class: 'lu-pos-lbl' }, 'BENCH'));
        innings.forEach(inn => {
          const sitting = g.lineup.battingOrder.filter(p => !fieldedPerInning[inn].has(p)).map(abbr);
          const td = el('td', { html: sitting.join('<br>') || '—' });
          benchTr.appendChild(td);
        });
        dBody.appendChild(benchTr);

        dTbl.appendChild(dBody);
        defSec.appendChild(dTbl);
        wrap.appendChild(defSec);
        mount.appendChild(wrap);

        // Legend
        const legend = el('div', { class: 'lu-legend' });
        [['#b8d8f8','Pitcher'],['#c8ecc8','Catcher'],['#ffe8a0','Bench']].forEach(([color, label]) => {
          const item = el('span');
          item.appendChild(el('span', { class: 'lu-legend-dot', style: `background:${color};` }));
          item.appendChild(document.createTextNode(label));
          legend.appendChild(item);
        });
        mount.appendChild(legend);

        // PDF button — generates printable sheet in new tab
        const pdfBtn = el('button', { class: 'lu-pdf-btn' }, '🖨️ Print / Save PDF');
        pdfBtn.addEventListener('click', () => {
          const d = new Date(g.date);
          const dateStr = isNaN(d) ? g.date : d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
          const timeStr = String(g.date).includes('T') ? d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) : '';
          const HA = g.home ? 'vs.' : '@';
          const homAway = g.home ? 'Home' : 'Away';

          const battingRows = g.lineup.battingOrder.map((name, i) =>
            `<tr><td class="num">${i+1}</td><td class="name">${name}</td></tr>`
          ).join('');

          const defRows = DEF_POSITIONS.map(pos => {
            const cls = pos === 'P' ? ' class="row-P"' : pos === 'C' ? ' class="row-C"' : '';
            const cells = innings.map(inn => {
              const name = (g.lineup.defense[inn] || {})[pos] || '';
              return `<td>${name ? abbr(name) : '—'}</td>`;
            }).join('');
            return `<tr${cls}><td class="pos-label">${pos}</td>${cells}</tr>`;
          }).join('');

          const benchRow = (() => {
            const cells = innings.map(inn => {
              const sitting = g.lineup.battingOrder.filter(p => !fieldedPerInning[inn].has(p)).map(abbr);
              return `<td>${sitting.join('<br>') || '—'}</td>`;
            }).join('');
            return `<tr class="row-bench"><td class="pos-label">BENCH</td>${cells}</tr>`;
          })();

          const innHeaders = innings.map(inn => `<th>INN ${inn}</th>`).join('');

          const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>Columbia Kings – ${HA} ${g.opponent} – ${dateStr}</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Arial,sans-serif; font-size:11px; background:#fff; color:#000; padding:16px; }
.header { text-align:center; margin-bottom:12px; border-bottom:3px solid #1a3a5c; padding-bottom:8px; }
.header h1 { font-size:22px; font-weight:900; color:#1a3a5c; text-transform:uppercase; letter-spacing:2px; }
.header .subtitle { font-size:13px; font-weight:bold; margin-top:3px; color:#333; }
.header .meta { font-size:11px; color:#555; margin-top:2px; }
.main { display:flex; gap:14px; align-items:flex-start; }
.batting-card { flex:0 0 160px; }
.card-title { background:#1a3a5c; color:#fff; text-align:center; font-weight:bold; font-size:11px; padding:5px 0; text-transform:uppercase; letter-spacing:1px; border-radius:3px 3px 0 0; }
.batting-table { width:100%; border-collapse:collapse; border:1px solid #aaa; border-top:none; }
.batting-table tr:nth-child(even) { background:#f0f4f8; }
.batting-table td { padding:5px 7px; border-bottom:1px solid #ccc; }
.batting-table .num { color:#1a3a5c; font-weight:bold; width:22px; text-align:center; border-right:1px solid #ccc; }
.defense-section { flex:1; }
.defense-table { width:100%; border-collapse:collapse; border:1px solid #aaa; border-top:none; table-layout:fixed; }
.defense-table th { background:#1a3a5c; color:#fff; text-align:center; padding:5px 3px; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; border-right:1px solid #4a6a8c; }
.defense-table th:last-child { border-right:none; }
.pos-header { background:#2d5a8e !important; text-align:left !important; padding-left:7px !important; width:40px; border-radius:3px 0 0 0; }
.defense-table td { padding:4px; border-bottom:1px solid #ccc; border-right:1px solid #ccc; text-align:center; font-size:10px; white-space:nowrap; }
.defense-table td:last-child { border-right:none; }
.defense-table tr:nth-child(even) td { background:#f0f4f8; }
.defense-table tr:nth-child(odd) td { background:#fff; }
.pos-label { background:#e8eef5 !important; font-weight:bold; color:#1a3a5c; text-align:left; padding-left:7px; border-right:2px solid #1a3a5c; }
.row-P td { background:#ddeeff !important; }
.row-P .pos-label { background:#b8d8f8 !important; }
.row-C td { background:#e8f5e8 !important; }
.row-C .pos-label { background:#c8ecc8 !important; }
.row-bench td { background:#fff8e1 !important; color:#7a5000 !important; }
.row-bench .pos-label { background:#ffe8a0 !important; color:#7a5000 !important; }
.legend { margin-top:8px; font-size:9px; color:#666; display:flex; gap:14px; flex-wrap:wrap; }
.legend-dot { width:12px; height:12px; border-radius:2px; display:inline-block; margin-right:3px; vertical-align:middle; }
@media print { body { padding:8px; } @page { margin:0.5in; } }
</style></head><body>
<div class="header">
  <h1>${team.team.name}</h1>
  <div class="subtitle">${HA} ${g.opponent} &nbsp;|&nbsp; ${dateStr}${timeStr ? ' &nbsp;|&nbsp; ' + timeStr : ''}</div>
  <div class="meta">${g.location || ''} &nbsp;·&nbsp; ${homAway}${g.notes ? ' &nbsp;·&nbsp; ' + g.notes : ''}</div>
</div>
<div class="main">
  <div class="batting-card">
    <div class="card-title">Batting Order</div>
    <table class="batting-table"><tbody>${battingRows}</tbody></table>
  </div>
  <div class="defense-section">
    <div class="card-title">Defensive Rotation by Inning</div>
    <table class="defense-table">
      <thead><tr><th class="pos-header">POS</th>${innHeaders}</tr></thead>
      <tbody>${defRows}${benchRow}</tbody>
    </table>
  </div>
</div>
<div class="legend">
  <span><span class="legend-dot" style="background:#b8d8f8;"></span>Pitcher</span>
  <span><span class="legend-dot" style="background:#c8ecc8;"></span>Catcher</span>
  <span><span class="legend-dot" style="background:#ffe8a0;"></span>Bench</span>
</div>
<script>window.onload = () => { window.print(); }<\/script>
</body></html>`;

          const win = window.open('', '_blank');
          win.document.write(html);
          win.document.close();
        });
        mount.appendChild(pdfBtn);
      }

      // === LINE SCORE ===
      if (Array.isArray(g.byInning) && g.byInning.length) {
        mount.appendChild(el('h3', { style: 'margin-top:1.5rem;' }, 'Line Score'));
        const lsWrap = el('div', { class: 'card', style: 'padding:0;overflow-x:auto;' });
        const tbl = el('table');
        const thead = el('thead');
        const thr = el('tr');
        thr.appendChild(el('th', {}, ''));
        g.byInning.forEach((_, i) => thr.appendChild(el('th', { class: 'num' }, String(i + 1))));
        thr.appendChild(el('th', { class: 'num' }, 'R'));
        thead.appendChild(thr);
        tbl.appendChild(thead);
        const tbody = el('tbody');
        const usRow = el('tr'); usRow.appendChild(el('td', {}, team.team.name));
        const oppRow = el('tr'); oppRow.appendChild(el('td', {}, g.opponent || 'Opp'));
        let usTot = 0, oppTot = 0;
        g.byInning.forEach(([u, o]) => {
          usTot += Number(u || 0); oppTot += Number(o || 0);
          usRow.appendChild(el('td', { class: 'num' }, String(u ?? '')));
          oppRow.appendChild(el('td', { class: 'num' }, String(o ?? '')));
        });
        usRow.appendChild(el('td', { class: 'num' }, String(usTot)));
        oppRow.appendChild(el('td', { class: 'num' }, String(oppTot)));
        tbody.appendChild(usRow); tbody.appendChild(oppRow);
        tbl.appendChild(tbody);
        lsWrap.appendChild(tbl);
        mount.appendChild(lsWrap);
      }

      // === BOX SCORE ===
      if (Array.isArray(g.batting) && g.batting.length) {
        mount.appendChild(el('h3', { style: 'margin-top:1.5rem;' }, 'Box Score'));
        const bWrap = el('div', { class: 'card', style: 'padding:0;overflow-x:auto;' });
        const tbl = el('table');
        const thead = el('thead');
        const thr = el('tr');
        ['Name','AB','H','2B','3B','HR','BB','K','R','RBI','AVG'].forEach((h, i) => {
          thr.appendChild(el('th', { class: i === 0 ? '' : 'num' }, h));
        });
        thead.appendChild(thr);
        tbl.appendChild(thead);
        const tbody = el('tbody');
        g.batting.forEach(p => {
          const tr = el('tr');
          tr.appendChild(el('td', {}, p.name || ''));
          ['AB','H','2B','3B','HR','BB','K','R','RBI'].forEach(k => {
            tr.appendChild(el('td', { class: 'num' }, String(p[k] ?? 0)));
          });
          tr.appendChild(el('td', { class: 'num' }, avg(p.H || 0, p.AB || 0)));
          tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        bWrap.appendChild(tbl);
        mount.appendChild(bWrap);
      }

      // === PITCHING ===
      if (Array.isArray(g.pitching) && g.pitching.length) {
        mount.appendChild(el('h3', { style: 'margin-top:1.5rem;' }, 'Pitching'));
        const pWrap = el('div', { class: 'card', style: 'padding:0;overflow-x:auto;' });
        const tbl = el('table');
        const thead = el('thead');
        const thr = el('tr');
        ['Name','IP','H','R','BB','K','HBP'].forEach((h, i) => {
          thr.appendChild(el('th', { class: i === 0 ? '' : 'num' }, h));
        });
        thead.appendChild(thr);
        tbl.appendChild(thead);
        const tbody = el('tbody');
        g.pitching.forEach(p => {
          const tr = el('tr');
          tr.appendChild(el('td', {}, p.name || ''));
          tr.appendChild(el('td', { class: 'num' }, String(p.IP || 0)));
          ['H','R','BB','K','HBP'].forEach(k => {
            tr.appendChild(el('td', { class: 'num' }, String(p[k] ?? 0)));
          });
          tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        pWrap.appendChild(tbl);
        mount.appendChild(pWrap);
      }

      // No data placeholder
      if (!g.lineup && !g.batting && !g.pitching && !g.byInning) {
        mount.appendChild(el('div', { class: 'card' },
          el('p', { class: 'meta' }, 'No stats entered yet. Use the stat entry form to add data.')
        ));
      }

      // Entry link — always shown at bottom of game detail
      const date = (g.date || '').split('T')[0];
      const entryCard = el('div', { class: 'card', style: 'margin-top:1.5rem;text-align:right;' });
      entryCard.appendChild(el('a', { href: 'entry.html?date=' + date }, '✏️ Enter / edit stats for this game →'));
      mount.appendChild(entryCard);
    })();
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
