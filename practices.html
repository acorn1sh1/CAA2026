<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Practices · Your 9U Team</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site">
    <div class="wrap">
      <h1><span class="ball">⚾</span> <span id="teamName">9U Team</span></h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="schedule.html">Schedule</a></li>
          <li><a href="practices.html">Practices</a></li>
          <li><a href="stats.html">Stats</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <h2>Practice Plans</h2>
    <p class="meta">Tap any plan to expand. Print-friendly — use your browser's print menu for a coach card.</p>

    <div id="practiceList" class="pill-row"></div>
    <div id="practices"></div>
  </main>

  <footer class="site">Built for Coach Andrew · 9U Spring 2026</footer>

  <script>
    async function loadJSON(path) {
      const res = await fetch(path, { cache: 'no-store' });
      if (!res.ok) throw new Error('Failed to load ' + path + ': ' + res.status);
      return res.json();
    }
    function el(tag, attrs = {}, ...children) {
      const e = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') e.className = v;
        else if (k === 'html') e.innerHTML = v;
        else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
        else e.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return e;
    }
    function fmtDate(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      let s = d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      if (String(iso).includes('T')) s += ' · ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
      return s;
    }
    function minutesToClock(startMin, durMin) {
      const end = startMin + durMin;
      const f = m => Math.floor(m / 60) + ':' + (m % 60).toString().padStart(2, '0');
      return f(startMin) + '–' + f(end);
    }
    document.addEventListener('DOMContentLoaded', () => {
      const here = location.pathname.split('/').pop() || 'index.html';
      document.querySelectorAll('nav a').forEach(a => {
        if (a.getAttribute('href') === here) a.classList.add('active');
      });
    });
  </script>
  <script src="data/team.js"></script>
  <script src="data/practices.js"></script>
  <script>
    (() => {
      const team = window.TEAM;
      const data = window.PRACTICES;
      document.getElementById('teamName').textContent = team.team.name;

      const list = document.getElementById('practiceList');
      const mount = document.getElementById('practices');
      const practices = data.practices.sort((a,b) => new Date(b.date) - new Date(a.date));

      practices.forEach((p, i) => {
        const btn = el('button', {
          class: i === 0 ? 'active' : '',
          'data-id': p.id,
          onclick: () => {
            document.querySelectorAll('#practiceList button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(p);
          }
        }, fmtDate(p.date));
        list.appendChild(btn);
      });

      function render(p) {
        mount.innerHTML = '';
        const card = el('div', { class: 'card' });

        card.appendChild(el('h3', {}, fmtDate(p.date) + ' · ' + p.location));
        card.appendChild(el('p', { class: 'meta' },
          `${p.duration} min · Focus: ${p.focus.join(' / ')}`
        ));

        if (p.equipment?.length) {
          const eq = el('details', {});
          eq.appendChild(el('summary', {}, `Equipment (${p.equipment.length})`));
          const ul = el('ul');
          p.equipment.forEach(x => ul.appendChild(el('li', {}, x)));
          eq.appendChild(ul);
          card.appendChild(eq);
        }

        if (p.coachingPoints?.length) {
          const cp = el('details', { open: '' });
          cp.appendChild(el('summary', {}, 'Coaching reminders'));
          const ul = el('ul');
          p.coachingPoints.forEach(x => ul.appendChild(el('li', {}, x)));
          cp.appendChild(ul);
          card.appendChild(cp);
        }

        p.blocks.forEach(b => {
          const block = el('div', { class: 'block' });
          block.appendChild(el('div', { class: 'time' }, minutesToClock(b.start, b.duration)));
          const body = el('div', { class: 'body' });
          body.appendChild(el('h4', {}, [el('span', { class: 'tag' }, b.tag || 'Block'), ' ', b.title]));
          if (b.drills) {
            const ul = el('ul');
            b.drills.forEach(d => ul.appendChild(el('li', {}, d)));
            body.appendChild(ul);
          }
          if (b.stations) {
            b.stations.forEach(st => {
              body.appendChild(el('p', {}, [el('strong', {}, st.name), ' ', el('span', { class: 'meta' }, `· ${st.coach} · ${st.players} players · ${st.reps}`)]));
              const ul = el('ul');
              st.drills.forEach(d => ul.appendChild(el('li', {}, d)));
              body.appendChild(ul);
            });
          }
          if (b.notes) body.appendChild(el('p', { class: 'meta' }, '💡 ' + b.notes));
          block.appendChild(body);
          card.appendChild(block);
        });

        mount.appendChild(card);

        // Drill library reference
        if (data.drillLibrary) {
          const ref = el('div', { class: 'card' });
          ref.appendChild(el('h3', {}, 'Drill library'));
          ref.appendChild(el('p', { class: 'meta' }, 'Quick-reference drills to mix into future plans.'));
          const grid = el('div', { class: 'grid' });
          Object.entries(data.drillLibrary).forEach(([cat, drills]) => {
            const box = el('div', { class: 'stat' });
            box.style.textAlign = 'left';
            box.appendChild(el('strong', {}, cat[0].toUpperCase() + cat.slice(1)));
            const ul = el('ul');
            drills.forEach(d => ul.appendChild(el('li', {}, d)));
            box.appendChild(ul);
            grid.appendChild(box);
          });
          ref.appendChild(grid);
          mount.appendChild(ref);
        }
      }

      if (practices[0]) render(practices[0]);
    })();
  </script>
</body>
</html>
